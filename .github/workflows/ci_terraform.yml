name: CI

on:
  push:
    branches:
      - "feature/infrestructure"
  pull_request:
    branches:
      - "dev"

jobs:
  validate:
    runs-on : ubuntu-latest

    steps:
        - name: Descargar Codigo
          uses: actions/checkout@v4

        - name: Configurar Terraform
          uses: hashicorp/setup-terraform@v4
          with:
            terraform_version: "1.15.4"
        
        - name: Terraform Init
          run: |
            cd terraform
            terraform init -backend=false

        - name: Terraform Validate
          run: |
            cd terraform
            terraform validate

        - name: Terraform  Plan
          run: |
            cd terraform
            terraform plan
